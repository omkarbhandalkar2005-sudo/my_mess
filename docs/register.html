<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create a Mess Tracker customer account.">
    <title>Create Account — Mess Tracker</title>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="my mess" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<main class="auth-page">
    <section class="auth-card" aria-labelledby="authTitle">
        <header class="auth-card-header">
            <div class="auth-logo" aria-hidden="true">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
            </div>
            <h1 id="authTitle">Create Account</h1>
            <p>Register as a customer</p>
        </header>

        <div class="auth-card-body">
            <div class="form-group">
                <label for="name">Full name</label>
                <input type="text" id="name" placeholder="John Doe" autocomplete="name">
            </div>

            <div class="form-group">
                <label for="contact">Contact number</label>
                <input type="text" id="contact" placeholder="9876543210" autocomplete="tel">
            </div>

            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Choose a password" autocomplete="new-password">
            </div>

            <!-- OTP Section -->
            <div class="form-group">
                <label for="otp">OTP</label>
                <input type="text" id="otp" placeholder="6-digit OTP enter karo" autocomplete="one-time-code" disabled>
            </div>
            <button class="btn btn-primary" id="otpBtn" onclick="sendOTP()" style="margin-bottom: var(--space-3);">Send OTP</button>

            <button class="btn btn-primary" onclick="register()" id="registerBtn" disabled>Create Account</button>

            <div id="msg" aria-live="polite"></div>

            <footer>
                <p class="auth-footer">
                    Already registered? <a href="login.html">Sign in</a>
                </p>
            </footer>
        </div>
    </section>
</main>

<script>
const API = "https://mess-tracker-production.up.railway.app";
function sendOTP() {
    const email  = document.getElementById("email").value;
    const msgEl  = document.getElementById("msg");
    const otpBtn = document.getElementById("otpBtn");

    if (!email) {
        msgEl.className = "alert alert-error";
        msgEl.innerText = "Pehle email daalo!";
        return;
    }

    otpBtn.disabled  = true;
    otpBtn.innerText = "Sending...";
    msgEl.className  = "";
    msgEl.innerText  = "";

    fetch(`${API}/send-otp`, {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ email })
    })
    .then(res => res.json())
    .then(data => {
        if (data.message.includes("sent")) {
            msgEl.className = "alert alert-success";
            msgEl.innerText = "OTP bhej diya! Email check karo 📧";
            document.getElementById("otp").disabled        = false;
            document.getElementById("registerBtn").disabled = false;

            // Resend button 60 seconds baad
            let secs = 60;
            const timer = setInterval(() => {
                otpBtn.innerText = `Resend (${secs}s)`;
                secs--;
                if (secs < 0) {
                    clearInterval(timer);
                    otpBtn.disabled  = false;
                    otpBtn.innerText = "Resend OTP";
                }
            }, 1000);
        } else {
            msgEl.className  = "alert alert-error";
            msgEl.innerText  = data.message;
            otpBtn.disabled  = false;
            otpBtn.innerText = "Send OTP";
        }
    })
    .catch(() => {
        msgEl.className  = "alert alert-error";
        msgEl.innerText  = "Server se connect nahi ho pa raha!";
        otpBtn.disabled  = false;
        otpBtn.innerText = "Send OTP";
    });
}

function register() {
    const data = {
        name:     document.getElementById("name").value,
        contact:  document.getElementById("contact").value,
        email:    document.getElementById("email").value,
        password: document.getElementById("password").value,
        otp:      document.getElementById("otp").value
    };

    const msgEl = document.getElementById("msg");
    msgEl.className = "";
    msgEl.innerText = "";

    if (!data.name || !data.contact || !data.email || !data.password || !data.otp) {
        msgEl.className = "alert alert-error";
        msgEl.innerText = "Sabhi fields bharo aur OTP verify karo!";
        return;
    }

    fetch(`${API}/register`, {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify(data)
    })
    .then(res => res.json())
    .then(data => {
        if (data.message.includes("successful")) {
            msgEl.className = "alert alert-success";
            msgEl.innerText = "Account created! Redirecting to sign in…";
            setTimeout(() => { window.location.href = "login.html"; }, 1500);
        } else {
            msgEl.className = "alert alert-error";
            msgEl.innerText = data.message;
        }
    })
    .catch(() => {
        msgEl.className = "alert alert-error";
        msgEl.innerText = "Unable to reach server. Is the backend running?";
    });
}
</script>

</body>
</html>
