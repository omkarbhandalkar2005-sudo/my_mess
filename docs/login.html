<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign in to your Mess Tracker account.">
    <title>Sign In — Mess Tracker</title>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="my mess" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<main class="auth-page">
    <section class="auth-card" aria-labelledby="authTitle">
        <header class="auth-card-header">
            <div class="auth-logo" aria-hidden="true">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
            </div>
            <h1 id="authTitle">Mess Tracker</h1>
            <p>Sign in to manage your mess account</p>
        </header>

        <div class="auth-card-body">
            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
            </div>

            <button class="btn btn-primary" onclick="login()">Sign In</button>

            <div id="loginMsg" aria-live="polite"></div>

            <footer>
                <p class="auth-footer">
                    <a href="forgot-password.html">Forgot password?</a>
                </p>

                <p class="auth-footer">
                    Don't have an account? <a href="register.html">Create one</a>
                </p>
            </footer>
        </div>
    </section>
</main>

<script>
const API = "https://mess-tracker-production.up.railway.app";
function login() {
    const data = {
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
    };

    const msgEl = document.getElementById("loginMsg");
    msgEl.className = "";
    msgEl.innerText = "";

    fetch(`${API}/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    })
      .then(async (res) => {
    const text = await res.text();

    let payload;
    try {
        payload = JSON.parse(text);
    } catch {
        payload = { message: text };
    }

    if (res.ok) {
        localStorage.setItem("loggedIn", "true");
        localStorage.setItem("role", String(payload.role).toLowerCase().trim());
        localStorage.setItem("customer_id", payload.customer_id);
        localStorage.setItem("name", payload.name || "");
        localStorage.setItem("contact", payload.contact || "");
        localStorage.setItem("email", payload.email || "");
        window.location.href = "index.html";
        return;
    }

    msgEl.className = "alert alert-error";
    msgEl.innerText = payload.message || "Invalid email or password";
   })
   .catch(err => {
    console.error(err);
    msgEl.className = "alert alert-error";
    msgEl.innerText = "Unable to reach server. Is the backend running?";
  });
    }

</script>

</body>
</html>
