<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — Mess Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="auth-page">
    <div class="auth-card">
        <div class="auth-card-header">
            <div class="auth-logo">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
            </div>
            <h1>Mess Tracker</h1>
            <p id="pageSubtitle">Enter your email to reset your password</p>
        </div>

        <div class="auth-card-body">

            <!-- STEP 1: Enter email, request OTP -->
            <div id="step1">
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" placeholder="you@example.com">
                </div>

                <button class="btn btn-primary" onclick="sendOtp()">Send OTP</button>

                <div id="step1Msg"></div>

                <p class="auth-footer">
                    Remember your password? <a href="login.html">Sign in</a>
                </p>
            </div>

            <!-- STEP 2: Enter OTP + new password -->
            <div id="step2" style="display:none;">
                <div class="form-group">
                    <label for="otp">OTP</label>
                    <input type="text" id="otp" placeholder="6-digit OTP" maxlength="6">
                </div>

                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" placeholder="Enter new password">
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Re-enter new password">
                </div>

                <button class="btn btn-primary" onclick="resetPassword()">Reset Password</button>

                <div id="step2Msg"></div>

                <p class="auth-footer">
                    Didn't get the OTP? <a href="#" onclick="backToStep1(); return false;">Try again</a>
                </p>
            </div>

        </div>
    </div>
</div>

<script>
const API = "https://mess-tracker-production.up.railway.app";
let savedEmail = "";

function sendOtp() {
    const email = document.getElementById("email").value.trim();
    const msgEl = document.getElementById("step1Msg");
    msgEl.className = "";
    msgEl.innerText = "";

    if (!email) {
        msgEl.className = "alert alert-error";
        msgEl.innerText = "Email daalo pehle";
        return;
    }

    fetch(`${API}/forgot-password/send-otp`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email })
    })
      .then(async (res) => {
        const text = await res.text();
        let payload;
        try { payload = JSON.parse(text); } catch { payload = { message: text }; }

        if (res.ok) {
            savedEmail = email;
            document.getElementById("pageSubtitle").innerText = "Enter the OTP sent to your email";
            document.getElementById("step1").style.display = "none";
            document.getElementById("step2").style.display = "block";
        } else {
            msgEl.className = "alert alert-error";
            msgEl.innerText = payload.message || "Kuch gadbad ho gayi";
        }
      })
      .catch(err => {
        console.error(err);
        msgEl.className = "alert alert-error";
        msgEl.innerText = "Unable to reach server. Is the backend running?";
      });
}

function resetPassword() {
    const otp             = document.getElementById("otp").value.trim();
    const newPassword     = document.getElementById("newPassword").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    const msgEl           = document.getElementById("step2Msg");
    msgEl.className = "";
    msgEl.innerText = "";

    if (!otp || !newPassword || !confirmPassword) {
        msgEl.className = "alert alert-error";
        msgEl.innerText = "Saare fields bharo";
        return;
    }

    if (newPassword !== confirmPassword) {
        msgEl.className = "alert alert-error";
        msgEl.innerText = "Passwords match nahi kar rahe";
        return;
    }

    fetch(`${API}/forgot-password/reset`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: savedEmail, otp, newPassword })
    })
      .then(async (res) => {
        const text = await res.text();
        let payload;
        try { payload = JSON.parse(text); } catch { payload = { message: text }; }

        if (res.ok) {
            msgEl.className = "alert alert-success";
            msgEl.innerText = payload.message || "Password reset ho gaya ✅";
            setTimeout(() => { window.location.href = "login.html"; }, 2000);
        } else {
            msgEl.className = "alert alert-error";
            msgEl.innerText = payload.message || "Kuch gadbad ho gayi";
        }
      })
      .catch(err => {
        console.error(err);
        msgEl.className = "alert alert-error";
        msgEl.innerText = "Unable to reach server. Is the backend running?";
      });
}

function backToStep1() {
    document.getElementById("pageSubtitle").innerText = "Enter your email to reset your password";
    document.getElementById("step2").style.display = "none";
    document.getElementById("step1").style.display = "block";
    document.getElementById("step1Msg").innerText = "";
    document.getElementById("step2Msg").innerText = "";
}
</script>

</body>
</html>
