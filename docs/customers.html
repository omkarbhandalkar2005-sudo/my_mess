<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="My Mess home — manage tiffin bookings, payments, and billing.">
    <title>Customers — My Mess</title>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="My Mess" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="stylesheet" href="styles.css">
    <script>
        document.documentElement.className =
            "role-" + (localStorage.getItem("role") || "customer").toLowerCase().trim();
    </script>
</head>
<body data-page="customers">

<nav class="navbar" aria-label="Main navigation">
    <div class="navbar-brand">
        <img src="favicon-96x96.png" width="22" height="22" alt="" style="border-radius: 4px;" aria-hidden="true">
        <span>My Mess</span>
    </div>
    <div class="navbar-actions">
        <span class="role-badge" id="roleBadge"></span>
        <button class="profile-avatar" id="profileAvatarBtn" onclick="goToAccount()" aria-haspopup="dialog" aria-label="Open your account">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
        </button>
    </div>
</nav>

<div class="app-shell">
    <aside class="sidebar" aria-label="Sidebar navigation">
        <nav class="sidebar-nav">
            <a href="index.html" class="sidebar-link" data-page="home">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
                <span>Home</span>
            </a>
            <a href="add-tiffin.html" class="sidebar-link admin-only" data-page="add-tiffin">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M18 8h1a4 4 0 0 1 0 8h-1M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
                </svg>
                <span>Add Tiffin</span>
            </a>
            <a href="record-payment.html" class="sidebar-link admin-only" data-page="record-payment">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                    <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                </svg>
                <span>Record Payment</span>
            </a>
            <a href="customers.html" class="sidebar-link admin-only" data-page="customers">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
                <span>Customers</span>
            </a>
            <a href="activity-history.html" class="sidebar-link" data-page="activity-history">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                    <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                </svg>
                <span>Activity History</span>
            </a>
        </nav>
    </aside>

<main class="page">
    <header class="page-header">
        <h1>Customers</h1>
        <p id="pageSubtitle">View all customers and their billing summary</p>
    </header>

    <div class="grid">

        <!-- All Customers (Admin) -->
        <section class="card grid-full admin-only" id="allCustomersSection" aria-labelledby="allCustomersHeading">
            <div class="card-header month-filter-header">
                <div class="month-filter-title">
                    <div class="card-icon" aria-hidden="true">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                        </svg>
                    </div>
                    <h2 id="allCustomersHeading">All Customers</h2>
                </div>
                <label class="month-filter-label" for="allCustomersMonthFilter">
                    <span class="sr-only">Select month</span>
                    <input type="month" id="allCustomersMonthFilter" class="month-filter-input" aria-label="Filter by month and year" onchange="onAllCustomersMonthChange()">
                </label>
            </div>
            <div id="allCustomersList" aria-live="polite"></div>
        </section>

        <!-- Customer profile (modal) -->
        <div class="modal-overlay" id="accountModal" onclick="if(event.target===this) closeAccountModal()">
            <section class="card modal-box" id="customerIdSection" role="dialog" aria-modal="true" aria-labelledby="accountHeading" tabindex="-1">
                <div class="card-header">
                    <div class="card-icon" aria-hidden="true">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                        </svg>
                    </div>
                    <h2 id="accountHeading" style="flex:1;">Your Account</h2>
                    <button class="modal-close" onclick="closeAccountModal()" aria-label="Close">&times;</button>
                </div>
                <div class="customer-banner customer-only">
                    <div>
                        <div class="customer-banner-label">Customer ID</div>
                        <div class="customer-banner-id" id="display_customer_id"></div>
                    </div>
                    <svg width="32" height="32" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" viewBox="0 0 24 24" aria-hidden="true">
                        <rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/>
                    </svg>
                </div>

                <div class="stats-grid customer-only">
                    <div class="stat-card">
                        <div class="stat-label">Name</div>
                        <div class="stat-value" id="display_name" style="font-size: var(--text-base);">—</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Phone</div>
                        <div class="stat-value" id="display_contact" style="font-size: var(--text-base);">—</div>
                    </div>
                    <div class="stat-card grid-full">
                        <div class="stat-label">Email</div>
                        <div class="stat-value" id="display_email" style="font-size: var(--text-base);">—</div>
                    </div>
                </div>
                <button class="btn btn-ghost btn-sm" style="margin-top: 1rem;" onclick="logout()">Sign Out</button>
            </section>
        </div>

    </div>
</main>
</div>

<script src="app.js"></script>
<script>
    function initCustomers() {
        initCommon();

        if (isAdmin()) {
            loadAllCustomers();
        }
    }

    initCustomers();
</script>

</body>
</html>
